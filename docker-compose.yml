services:
  qwen-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-qwen-api-proxy}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-qwen-proxy}
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3264}
      HOST: ${HOST:-0.0.0.0}
      SKIP_ACCOUNT_MENU: ${SKIP_ACCOUNT_MENU:-true}
      CHROME_PATH: ${CHROME_PATH:-/usr/bin/chromium}
    # ports:
      # - "${HOST_PORT:-3264}:${PORT:-3264}"
    volumes:
      - ${SESSION_VOLUME:-./session}:/app/${SESSION_DIR:-session}
      - ${LOGS_VOLUME:-./logs}:/app/${LOGS_DIR:-logs}
      - ${UPLOADS_VOLUME:-./uploads}:/app/${UPLOADS_DIR:-uploads}
    shm_size: ${SHM_SIZE:-1gb}
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 3264) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
