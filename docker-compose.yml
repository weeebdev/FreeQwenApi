services:
  qwen-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-qwen-api-proxy}:${IMAGE_TAG:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3264}
      HOST: ${HOST:-0.0.0.0}
      SKIP_ACCOUNT_MENU: ${SKIP_ACCOUNT_MENU:-true}
      CHROME_PATH: ${CHROME_PATH:-/usr/bin/chromium}
      QWEN_ACCOUNTS_JSON: ${QWEN_ACCOUNTS_JSON:-}
      QWEN_TOKENS: ${QWEN_TOKENS:-}
      QWEN_ACCOUNTS_OVERWRITE: ${QWEN_ACCOUNTS_OVERWRITE:-false}
    # expose:
      # - "3264"
    volumes:
      - session_data:/app/session
      - logs_data:/app/logs
      - uploads_data:/app/uploads
    shm_size: ${SHM_SIZE:-1gb}
    restart: ${RESTART_POLICY:-unless-stopped}

volumes:
  session_data:
  logs_data:
  uploads_data:
